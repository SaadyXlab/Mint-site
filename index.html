<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAADYXLAB NFT</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: linear-gradient(125deg, #0a0a0a, #111);
  color: #fff;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  padding: 15px 25px; /* reduced spacing */
  align-items: center;
}

header h1 {
  color: #7df9ff;
  letter-spacing: 1px;
}

/* NAV (FIXED SPACING) */
nav a {
  margin-left: 12px; /* reduced from 20px */
  text-decoration: none;
  color: #ccc;
  transition: 0.3s;
  font-size: 14px;
}

nav a:hover {
  color: #7df9ff;
}

/* HERO */
.hero {
  text-align: center;
  padding: 100px 20px;
  animation: fadeIn 1.2s ease-in;
}

.hero h2 {
  font-size: 48px;
  margin-bottom: 15px;
  animation: slideUp 1s ease;
}

.hero p {
  color: #aaa;
  margin-bottom: 30px;
}

/* BUTTON */
.btn {
  padding: 14px 30px;
  background: #7df9ff;
  border: none;
  border-radius: 30px;
  color: #000;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
  box-shadow: 0 0 10px #7df9ff55;
}

.btn:hover {
  transform: scale(1.08);
  box-shadow: 0 0 20px #7df9ff;
}

/* SECTIONS */
.section {
  padding: 80px 20px;
  text-align: center;
}

/* CARDS */
.cards {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 20px;
  margin-top: 40px;
}

.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  padding: 25px;
  border-radius: 15px;
  width: 260px;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px) scale(1.02);
  box-shadow: 0 0 20px #7df9ff33;
}

.card h3 {
  color: #7df9ff;
  margin-bottom: 10px;
}

/* MINT BOX */
.mint-box {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  padding: 35px;
  border-radius: 20px;
  max-width: 420px;
  margin: 40px auto;
  animation: fadeIn 1.5s ease-in;
}

.mint-box input {
  width: 100%;
  padding: 12px;
  margin: 12px 0;
  border-radius: 8px;
  border: none;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  color: #666;
}

/* ANIMATIONS */
@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}

@keyframes slideUp {
  from {
    transform: translateY(30px);
    opacity: 0;
  }
  to {
    transform: translateY(0);
    opacity: 1;
  }
}
</style>
</head>

<body>

<header>
  <h1>SAADYXLAB</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#">Utility</a>
    <a href="#">Mint</a>
  </nav>
</header>

<section class="hero">
  <h2>Enter Saady Dimension</h2>
  <p>2222 elite NFTs built for real Web3 players</p>
  <button class="btn">Connect Wallet</button>
</section>

<section class="section">
  <h2>Utility</h2>
  <div class="cards">
    <div class="card">
      <h3>Alpha Access</h3>
      <p>Private calls and early drops</p>
    </div>
    <div class="card">
      <h3>Staking</h3>
      <p>Earn rewards from holding</p>
    </div>
    <div class="card">
      <h3>Community</h3>
      <p>Strong and active Web3 network</p>
    </div>
  </div>
</section>

<section class="section">
  <h2>Mint</h2>
  <div class="mint-box">
    <p>Price: 0.05 ETH</p>
    <input type="number" placeholder="Quantity (1-5)">
    <button class="btn">Mint Now</button>
  </div>
</section>

<footer>
  <p>@SadXlab 2026</p>
</footer>

</body>
</html>
